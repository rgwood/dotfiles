- defaults:
      link:
          relink: true

- clean: ["~"]

- shell:
      - command: git submodule update --init --recursive
        description: Installing submodules
        stderr: true

- defaults:
      link:
          create: true # create directories if needed

- link:
      ~/dotfiles: ""
      # macOS apps look in ~/Library/Application Support instead of XDG;
      # each Darwin link is paired with its XDG twin
      ~/.config/nushell/config.nu: nu/config.nu
      ~/.config/nushell/env.nu: nu/env.nu
      ~/Library/Application Support/nushell/config.nu:
            path: nu/config.nu
            if: '[[ "$(uname)" == "Darwin" ]]'
      ~/Library/Application Support/nushell/env.nu:
            path: nu/env.nu
            if: '[[ "$(uname)" == "Darwin" ]]'
      ~/.vimrc: vimrc
      ~/notes: notes
      ~/.zshrc: zsh/zshrc
      ~/.config/micro/settings.json:
          force: true
          path: micro/settings.json
      ~/Library/Application Support/lazygit/config.yml:
            path: lazygit/config.yml
            if: '[[ "$(uname)" == "Darwin" ]]'
      ~/.config/lazygit/config.yml: lazygit/config.yml
      ~/.sqliterc: sqliterc
      ~/.zsh-plugins/zsh-autosuggestions: zsh-autosuggestions
      ~/.editorconfig: .editorconfig
      ~/.gitignore: git/personal-gitignore
      ~/.config/starship.toml: starship.toml
      ~/.wezterm.lua: wezterm/wezterm.lua
      ~/bin/:
            glob: true
            path: bin/*
      ~/justfile: just/global-justfile
      ~/.claude/CLAUDE.md: agents/CLAUDE.md
      ~/.claude/AGENTS.md: agents/AGENTS.md
      ~/.codex/AGENTS.md: agents/AGENTS.md
      ~/.claude/settings.json: agents/claude.user.settings.json
      ~/.claude/statusline-command.sh: agents/statusline-command.sh
      ~/.claude/skills/pr-description:
            path: agents/skills/pr-description
      ~/.claude/skills/explain-diff-html:
            path: agents/skills/explain-diff-html
      ~/.claude/skills/govuk-style:
            path: agents/skills/govuk-style

- create:
      - ~/bin
      - ~/scratch
      - ~/src # shortlist of commonly used projects
      - ~/source # everything under the sun
      - ~/github

- shell:
      - command: python3 scripts/ensure-tools.py
        description: Ensuring essential tools are installed
        stderr: true
      - git config --global core.editor micro
